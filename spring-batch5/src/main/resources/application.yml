## log4j2 configuration
logging.config: classpath:log4j2-${spring.profiles.active}.xml

## mybatis
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:/mapper/**/*.xml

## app properties
## batch-quartz job enabler
job.enabler.sample: true
