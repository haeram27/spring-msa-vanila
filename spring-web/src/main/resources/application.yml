# common appliction properies:
# https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html

spring.profiles.active: dev

logging.config: classpath:log4j2-${spring.profiles.active}.xml

# hikari connection pool config
spring.datasource.hikari: 
  pool-name: TEST-CONNECTION-POOl
  minimum-idle: 10
  maximum-pool-size: 50
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000

mybatis:
  configuration: 
    map-underscore-to-camel-case: true
    use-generated-keys: true
  mapper-locations: classpath:/mapper/**/*.xml
  # DAO(result type) package
  type-aliases-package: com.example.springwebex.model

---
spring:
  config:
    activate:
      on-profile: dev

  # db datasource 
  datasource:
    # driver-class-name: org.h2.Driver
    # #url: 'jdbc:h2:mem:h2test'   # mode: in-memory
    # url: 'jdbc:h2:~/h2test'    # mode: embedded (db file in user home)
    # #url: 'jdbc:h2:tcp://localhost/mem:h2test'
    # username: sa
    # password: 1234
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/dvdrental
    username: postgres
    password:

  # h2 console
  h2:
    console: # h2 web console ui support (non in-momory mode)
      enabled: true 
      path: /h2
      settings:
        trace: false
        web-allow-others: true

  # jpa for h2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none        # init strategy (none, create, create-drop, update, validate)
    properties:
      hibernate:
        format_sql: true      # query log format (sorting)
        show_sql: true        # query log print

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/h2.schema.sql
      data-locations: classpath:sql/h2.data.sql

my:
  datasource:
    url: dev.db.com
    username: dev_user
    password: dev_pw
    etc:
      max-connection: 10
      timeout: 60s
      options: DEV, CACHE

---
spring:
  config:
    activate:
      on-profile: prod
my:
  datasource:
    url: prod.db.com
    username: prod_user
    password: prod_pw
    etc:
      max-connection: 50
      timeout: 10s
      options: PROD, CACHE
