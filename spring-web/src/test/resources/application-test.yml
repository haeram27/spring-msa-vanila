spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-port: 9092 # 원하는 포트 번호 입력
        web-allow-others: true
  jpa:
    database: h2
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true

my:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: sa
    etc:
      max-connection: 5
      timeout: 30s
      options:
        - TEST
